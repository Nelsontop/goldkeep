services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - goldkeep_data:/app/data
      - goldkeep_uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:////app/data/goldkeep.db
      - UPLOAD_DIR=/app/uploads
      - INITIAL_PASSWORD=f452cbe6326b14f5
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  goldkeep_data:
  goldkeep_uploads:
